  <script>
    // テーマ初期化（FOUC 回避のため <head> 内で実行）＋トグルハンドラ
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || t === 'light') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
      document.addEventListener('DOMContentLoaded', function () {
        var btn = document.getElementById('theme-toggle');
        if (!btn) return;
        btn.addEventListener('click', function () {
          var html = document.documentElement;
          var cur = html.getAttribute('data-theme') ||
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          var next = cur === 'dark' ? 'light' : 'dark';
          html.setAttribute('data-theme', next);
          try { localStorage.setItem('theme', next); } catch (e) {}
        });
      });
    })();
  </script>
  <title>クロスワード辞典｜パターンに当てはまる単語を瞬時に検索！</title>

<body>

<header>
  <a href="/" class="header-icon-link" aria-label="ホームへ戻る"><img src="favicon.png" alt="" class="header-icon" aria-hidden="true"></a>
  <div>
    <h1>クロスワード辞典</h1>
    <p class="header-tagline">パターンに当てはまる単語を瞬時に検索！</p>
  </div>
  <button type="button" class="header-theme-toggle" id="theme-toggle" aria-label="テーマ切替" title="テーマ切替">
    <svg class="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg class="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
    </svg>
  </button>
  <a href="help.html" class="header-help-link" aria-label="使い方ガイド">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
  </a>
</header>

<!-- 検索エリア（main の外に出してブラウザ幅いっぱいに広げる） -->
<div class="search-sticky-wrap">
  <section class="search-area">
    <label for="search-input">当てはまる単語を探そう</label>
    <form id="search-form" action="#" novalidate>
    <div class="input-row">
      <div class="input-wrapper">
        <svg class="input-icon-search" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="search-input"
          name="q"
          lang="ja"
          autocomplete="on"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          enterkeyhint="done"
          placeholder="検索パターンを入力 (例: ？？いろ)"
        >
        <button type="button" id="clear-btn" aria-label="入力を消去" title="入力を消去" hidden>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
    <!-- スマホ用：ワイルドカード挿入チップ（PC 非表示） -->
    <div class="wc-chips" id="wc-chips" aria-label="ワイルドカード挿入">
      <button type="button" class="wc-chip wc-chip-wild" data-insert="？" aria-label="？（任意の1文字）を挿入">？</button>
      <button type="button" class="wc-chip wc-chip-wild" data-insert="＊" aria-label="＊（任意の0文字以上）を挿入">＊</button>
      <button type="button" class="wc-chip" data-insert="１" aria-label="１を挿入">１</button>
      <button type="button" class="wc-chip" data-insert="２" aria-label="２を挿入">２</button>
      <button type="button" class="wc-chip" data-insert="３" aria-label="３を挿入">３</button>
      <button type="button" class="wc-chip" data-insert="４" aria-label="４を挿入">４</button>
      <button type="button" class="wc-chip" data-insert="５" aria-label="５を挿入">５</button>
      <button type="button" class="wc-chip" data-insert="６" aria-label="６を挿入">６</button>
      <button type="button" class="wc-chip" data-insert="７" aria-label="７を挿入">７</button>
      <button type="button" class="wc-chip" data-insert="８" aria-label="８を挿入">８</button>
      <button type="button" class="wc-chip" data-insert="９" aria-label="９を挿入">９</button>
    </div>
    </form>
  </section>
</div>

<!-- 結果ヘッダー（main の外に出してブラウザ幅いっぱいに広げる） -->
<div class="results-header">
  <div class="results-header-inner">
    <div class="hit-count-wrap">
      <span id="hit-count"></span>
      <button id="copy-all-btn" type="button" class="copy-all-btn" hidden aria-label="検索結果をすべてコピー">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
    </div>
    <div class="view-toggle-group" id="view-toggle-group" hidden>
      <button id="btn-detail" type="button">詳細表示</button>
      <button id="btn-simple" type="button">簡易表示</button>
    </div>
  </div>
</div>

<!-- スクリーンリーダー向け：検索結果件数の通知（視覚的には非表示） -->
<div id="sr-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<main>
  <!-- 入力前ガイド（凡例＋ヘルプリンク） -->
  <div id="search-guide">
    <dl class="legend">
      <div class="legend-item"><dt><code>？</code></dt><dd>任意の1文字</dd></div>
      <div class="legend-item"><dt><code>＊</code></dt><dd>任意の0文字以上</dd></div>
      <div class="legend-item"><dt><code>1〜9</code></dt><dd>同じ数字＝同じ文字</dd></div>
    </dl>
    <p class="guide-note"><a href="help.html">使い方ガイドを見る →</a></p>
  </div>
  <!-- 結果リスト -->
  <ul id="results-list"></ul>
  <div id="loading-indicator" class="loading-indicator" aria-live="polite" hidden>
    <span class="book-loader" aria-hidden="true">
      <span class="book-page"></span>
      <span class="book-page"></span>
      <span class="book-page"></span>
    </span>
  </div>
</main>
