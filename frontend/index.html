<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a6abf">
  <title>クロスワード辞典｜パターンに当てはまる単語を瞬時に検索！</title>
  <meta name="description" content="クロスワード作成/解答用の単語検索Webアプリ。ワイルドカード（？, ＊, 数字）に対応し、効率よく候補を探せます。">
  <meta name="robots" content="index,follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="クロスワード辞典">
  <meta property="og:description" content="クロスワード作成/解答用の単語検索Webアプリ。ワイルドカード対応。">
  <meta property="og:locale" content="ja_JP">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="クロスワード辞典">
  <meta name="twitter:description" content="クロスワード作成/解答用の単語検索Webアプリ。">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css?v=2026040916">
</head>
<body>

<header>
  <a href="/" class="header-icon-link" aria-label="ホームへ戻る"><img src="favicon.png" alt="" class="header-icon" aria-hidden="true"></a>
  <div>
    <h1>クロスワード辞典</h1>
    <p>パターンに当てはまる単語を瞬時に検索！</p>
  </div>
</header>

<!-- 検索エリア（main の外に出してブラウザ幅いっぱいに広げる） -->
<div class="search-sticky-wrap">
  <section class="search-area">
    <label for="search-input">検索パターンを入力</label>
    <div class="input-row">
      <div class="input-wrapper">
        <svg class="input-icon-search" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="search-input"
          lang="ja"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder="例: ？？カ？, ＊イロ, １２３３"
        >
        <button type="button" id="clear-btn" aria-label="入力をクリア" hidden>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
    <p class="hint">
      <code>?</code> 任意の1字 &nbsp;
      <code>*</code> 任意の0字以上 &nbsp;
      <code>1-9</code> ナンクロ数字
    </p>
  </section>
</div>

<!-- 結果ヘッダー（main の外に出してブラウザ幅いっぱいに広げる） -->
<div class="results-header">
  <div class="results-header-inner">
    <span id="hit-count"></span>
    <span class="results-actions">
      <button id="view-toggle" hidden>簡易表示</button>
      <button id="copy-btn" disabled class="disabled" hidden>まとめてコピー</button>
    </span>
  </div>
</div>

<main>
  <!-- 結果リスト -->
  <ul id="results-list"></ul>
  <div id="loading-indicator" class="loading-indicator" aria-live="polite" hidden>
    <span class="book-loader" aria-hidden="true">
      <span class="book-page"></span>
      <span class="book-page"></span>
      <span class="book-page"></span>
    </span>
  </div>
</main>

<footer>
  辞書データは <a href="https://github.com/skk-dev/dict" target="_blank" rel="noopener">SKK-JISYO.L</a> に基づいています
  （<a href="https://www.gnu.org/licenses/gpl-3.0.html" target="_blank" rel="noopener">GPL</a>）<br>
  このアプリもGPLで公開しています（<a href="https://github.com/metroid-vania/crossword-search" target="_blank" rel="noopener">GitHub</a>）<br>
  2026 <a href="https://crossword-builder.com" target="_blank" rel="noopener">CROSSWORD-BUILDER.com</a>
</footer>

<button id="back-to-top" aria-label="TOPへ戻る">
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <polyline points="18 15 12 9 6 15"/>
  </svg>
</button>
<script src="app.js?v=2026040915"></script>
</body>
</html>
